      - heading "Como ler uma receita médica em Portugal" [level=1] [ref=e20]
      - paragraph [ref=e21]: A receita eletrónica do SNS tem várias informações que muita gente não percebe — e isso leva a tomar mal os medicamentos. Este guia explica, parte a parte, o que cada coisa quer dizer.
      - generic [ref=e22]:
        - generic [ref=e23]: Atualizado em Junho de 2026
